<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Question For You ❤️</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: white;
            font-size: 3rem;
        }

        p {
            color: white;
            font-size: 1.3rem;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin: 10px;
            transition: 0.3s;
        }

        #yesBtn {
            background: #4CAF50;
            color: white;
        }

        #noBtn {
            background: #f44336;
            color: white;
            position: absolute;
        }

        #message {
            margin-top: 20px;
            font-size: 1.5rem;
            color: white;
            font-weight: bold;
        }

        .hearts {
            position: fixed;
            font-size: 2rem;
            animation: floatUp 3s linear forwards;
        }

        @keyframes floatUp {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(-300px);
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Hi ❤️</h1>
    <p>I have a very important question...</p>
    <h2>Will you go out with me? 😊</h2>

    <button id="yesBtn" onclick="accepted()">YES ❤️</button>
    <button id="noBtn" onclick="moveNo()">NO 😅</button>

    <div id="message"></div>
</div>

<script>

let noCount = 0;

function moveNo() {
    noCount++;

    const btn = document.getElementById("noBtn");

    const x = Math.random() * (window.innerWidth - 150);
    const y = Math.random() * (window.innerHeight - 80);

    btn.style.left = x + "px";
    btn.style.top = y + "px";

    const messages = [
        "Wrong option 😜",
        "Try again 😂",
        "Are you sure? 🤔",
        "The YES button looks better ❤️",
        "Nice try 😆"
    ];

    document.getElementById("message").innerHTML =
        messages[(noCount - 1) % messages.length];
}

function accepted() {

    document.body.innerHTML = `
        <div style="
            height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
            background:linear-gradient(135deg,#ff758c,#ff7eb3);
            color:white;
            font-family:Arial;">
            <h1 style="font-size:4rem;">YAY! 🎉❤️</h1>
            <h2>Best decision ever 😊</h2>
            <p>Now let's plan our first date 🌹</p>
        </div>
    `;

    setInterval(createHeart, 300);
}

function createHeart() {
    const heart = document.createElement("div");
    heart.className = "hearts";
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.bottom = "0px";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 3000);
}

</script>

</body>
</html>
